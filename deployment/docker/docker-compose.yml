version: '3.8'

services:
  # PostgreSQL - Primary database
  postgres:
    image: postgres:16-alpine
    container_name: polis-postgres
    environment:
      POSTGRES_DB: polis
      POSTGRES_USER: polis
      POSTGRES_PASSWORD: polis_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - polis_network
    restart: unless-stopped

  # Qdrant - Vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: polis-qdrant
    ports:
      - "6334:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: qdrant_key_dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6334/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - polis_network
    restart: unless-stopped

  # MinIO - Object storage
  minio:
    image: minio/minio:latest
    container_name: polis-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev_password
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - polis_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  minio_data:
    driver: local

networks:
  polis_network:
    driver: bridge
